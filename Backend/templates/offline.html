<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - APSRTC Live</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a2332 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .offline-container {
            max-width: 400px;
            padding: 40px;
        }
        .offline-icon {
            font-size: 5rem;
            opacity: 0.6;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h2 { font-weight: 800; margin-top: 24px; letter-spacing: -0.5px; }
        p { color: #8b949e; font-size: 1.05rem; line-height: 1.6; }
        .retry-btn {
            background: #00A859;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.05rem;
            margin-top: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .retry-btn:hover {
            background: #007D43;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 168, 89, 0.3);
        }
        .pulse-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(0, 168, 89, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            animation: pulse-offline 2s ease-in-out infinite;
        }
        @keyframes pulse-offline {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 168, 89, 0.3); }
            50% { box-shadow: 0 0 0 20px rgba(0, 168, 89, 0); }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="pulse-ring">
            <div class="offline-icon">📡</div>
        </div>
        <h2>You're Offline</h2>
        <p>It looks like you've lost your internet connection. Don't worry — APSRTC Live will reconnect automatically when you're back online.</p>
        <button class="retry-btn" onclick="window.location.reload()">
            <i class="bi bi-arrow-clockwise"></i> Try Again
        </button>
    </div>

    <script>
        // Auto-reload when connection is restored
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
