name: Build and deploy Python app to Azure Web App - apsrtc-tracker-1122

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd Backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure requirements.txt is at root for Oryx build detection
        run: |
          cp Backend/requirements.txt requirements.txt

      - name: Zip artifact for deployment
        run: |
          zip -r release.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "Backend/venv/*" \
            -x "Backend/venv2/*" \
            -x "Backend/__pycache__/*" \
            -x "Backend/*.pyc" \
            -x "Backend/Test_Frontend/*" \
            -x "Backend_Backup/*" \
            -x "check.py" \
            -x "check2.py" \
            -x "check3.py" \
            -x "diff.txt" \
            -x "diff_out.txt" \
            -x "diff_utf8.txt" \
            -x "status.txt"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6464AF1D79A14454BDBB8492D2D16F73 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_11777FC3361F4064A26B834E49B67EEF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_35495840F0BA4BA1A5D5D48561A24313 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'apsrtc-tracker-1122'
          slot-name: 'Production'
          package: release.zip
          startup-command: 'gunicorn --chdir Backend backend:app --workers 4 --threads 2 --worker-class gthread --timeout 120 --preload --log-level info'
